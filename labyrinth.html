<body>
<div id="app">
  <section id="menu" class="screen">
    <div class="sub" id="subEl"></div>
    <h1 class="title" id="titleEl"></h1>
    <p class="lead" id="leadEl"></p>
    <div class="howto" id="howEl"></div>
    <div class="field"><label>Mode</label><div class="chips" id="modeRow"></div></div>
    <div class="field"><label id="pilotLbl"></label><input id="nameIn" maxlength="14" placeholder="Your name" autocomplete="off"></div>
    <div class="field"><label id="crewLbl"></label><div class="chips" id="charRow"></div></div>
    <div class="field"><label>Difficulty</label><div class="chips tier" id="tierRow"></div></div>
    <div class="field"><label id="codeLbl">Squad code (optional &mdash; share a board with friends)</label><input id="codeIn" maxlength="24" placeholder="e.g. ORION" autocomplete="off"></div>
    <button id="startBtn" class="cta">Begin</button>
    <button id="boardBtn" class="linkbtn">View leaderboard</button>
    <div class="err" id="menuErr"></div>
  </section>
  <section id="game" class="screen hidden">
    <div id="hud"><div id="livesBox"></div><span class="hstat">Cleared <b id="statCorrect">0</b></span><span id="tierPill">EXPLORER</span><span id="runTimer">0:00</span></div>
    <div id="mpBar" class="hidden"></div>
    <div id="mapScroll"><div id="mapInner"><svg id="edgesSvg" xmlns="http://www.w3.org/2000/svg"></svg></div></div>
    <div id="hint"></div>
  </section>
  <section id="lobby" class="screen hidden" style="justify-content:center;align-items:center;">
    <div class="sub">Race &middot; Room</div>
    <div id="lobbyCode"></div>
    <ul id="lobbyList"></ul>
    <div id="lobbyStatus"></div>
    <button id="startRaceBtn" class="cta" style="max-width:320px;width:100%;">Start race</button>
    <button id="leaveLobby" class="linkbtn">Leave room</button>
  </section>
  <div id="countdown" class="hidden">3</div>
  <div id="obWrap" class="hidden"><div id="obCard">
    <div id="obBanner"></div><div id="obStreak" class="hidden"></div>
    <div class="obTimerWrap"><div id="obTimer"></div></div>
    <div id="obQ"></div><div id="obOpts"></div><div id="obFx"></div>
  </div></div>
  <section id="result" class="screen hidden">
    <h1 id="resTitle" class="display"></h1>
    <div id="resStats"></div>
    <div class="saveArea hidden" id="saveArea">
      <div class="savesum" id="saveSummary"></div>
      <div class="saverow"><input id="boardName" maxlength="14" placeholder="Your name"><button class="save" id="boardSave">Save</button></div>
    </div>
    <div class="board"><h3 id="boardTitle">This device</h3><ul id="boardList"></ul><div class="bempty hidden" id="boardEmpty"></div></div>
    <button id="againBtn" class="cta" style="max-width:320px;width:100%;">Play again</button>
    <button id="menuBtn2" class="linkbtn">Back to menu</button>
  </section>
  <section id="boardScreen" class="screen hidden" style="justify-content:center;align-items:center;">
    <div class="sub">Leaderboard</div>
    <div class="board"><h3 id="boardTitle2">This device</h3><ul id="boardList2"></ul><div class="bempty hidden" id="boardEmpty2"></div></div>
    <button id="boardBack" class="cta" style="max-width:320px;width:100%;">Back</button>
  </section>
</div>

    var players=Object.keys(latest).map(function(n){ return {name:n,depth:latest[n].depth,lives:latest[n].lives,state:latest[n].state,t:latest[n].t,fin:(finals[n]!=null?finals[n]:null)}; });
    return {go:goStart!=null,start:goStart,tier:tier,maxT:maxT,players:players}; }
  function sortStandings(ps){ return ps.slice().sort(function(a,b){ var af=a.fin!=null,bf=b.fin!=null; if(af&&bf) return a.fin-b.fin; if(af) return -1; if(bf) return 1; var ae=a.state===2,be=b.state===2; if(ae!==be) return ae?1:-1; return b.depth-a.depth; }); }
  function stopLobby(){ if(lobbyId){ clearInterval(lobbyId); lobbyId=null; } }
  function stopRacePoll(){ if(pollId){ clearInterval(pollId); pollId=null; } }
  function stopResults(){ if(resultsId){ clearInterval(resultsId); resultsId=null; } }
  function stopAllNet(){ stopLobby(); stopRacePoll(); stopResults(); }
  function enterLobby(){ mpOn=false; show('lobby'); $('lobbyCode').textContent=room; $('lobbyStatus').textContent='Waiting for players\u2026'; mpPing(0,LIVES,0); stopLobby(); lobbyId=setInterval(lobbyTick,1500); lobbyTick(); }
  function lobbyTick(){ mpPing(0,LIVES,0); mpPoll().then(function(rows){ var d=digest(rows);
    var present=d.players.filter(function(p){ return (d.maxT-p.t)<12000; }).map(function(p){ return p.name; });
    if(present.indexOf(myName)<0) present.push(myName); renderLobby(present);
    if(d.go && (d.maxT-d.start)<15000){ stopLobby(); beginCountdown(d.tier); } }); }
  function renderLobby(list){ var ul=$('lobbyList'); ul.innerHTML=''; list.forEach(function(n){ var li=document.createElement('li'); li.className='prow'; li.innerHTML='<span class="dot" style="background:var(--gate)"></span>'+escapeHtml(n)+(n===myName?' <small>(you)</small>':''); ul.appendChild(li); });
    $('lobbyStatus').textContent = list.length>1 ? (list.length+' in the room \u2014 anyone can start') : 'Waiting for players\u2026 share the room code'; }
  function beginCountdown(tier){ raceTier=tier; var ov=$('countdown'); ov.classList.remove('hidden'); var n=3; ov.textContent='3'; beep(440,.1,'sine',.12);
    var iv=setInterval(function(){ n--; if(n>0){ ov.textContent=String(n); beep(440,.1,'sine',.12); } else if(n===0){ ov.textContent='GO!'; beep(720,.16,'sine',.14); } else { clearInterval(iv); ov.classList.add('hidden'); startRaceGame(); } },800); }
  function startRaceGame(){ mpOn=true; beginGame(raceTier, mulberry32(hstr(room))); mpPing(0,LIVES,0); stopRacePoll(); pollId=setInterval(racePollTick,1600); racePollTick(); }
  function racePollTick(){ mpPoll().then(function(rows){ renderMpBar(digest(rows)); }); }
  function renderMpBar(d){ var bar=$('mpBar'); if(!mpOn){ bar.classList.add('hidden'); return; } bar.classList.remove('hidden');
    var R=(S?S.map.R+1:1), ord=sortStandings(d.players);
    bar.innerHTML=ord.slice(0,5).map(function(p){ var pct=Math.round(Math.min(1,p.depth/R)*100); var mark=p.fin!=null?' \u2713':(p.state===2?' \u2717':'');
      return '<div class="mprow'+(p.name===myName?' me':'')+'"><span class="mpn">'+escapeHtml(p.name)+mark+'</span><span class="mpt"><span class="mpf" style="width:'+pct+'%"></span></span></div>'; }).join(''); }
  function mpResults(outcome){ stopRacePoll(); show('result'); $('saveArea').classList.add('hidden'); $('againBtn').classList.add('hidden');
    $('resTitle').textContent = outcome==='win'?W.winTitle:'Out of the race'; $('resTitle').style.color = outcome==='win'?'var(--gold)':'var(--wrong)';
    stopResults(); resultsId=setInterval(resultsTick,1600); resultsTick(); }
  function resultsTick(){ mpPoll().then(function(rows){ var ord=sortStandings(digest(rows).players); var winner=(ord.length&&ord[0].fin!=null)?ord[0].name:null;
    var html=''; if(winner) html+='<div style="margin-bottom:10px;font-weight:800;color:var(--gold);">'+(winner===myName?'You won the race!':escapeHtml(winner)+' won the race')+'</div>';
    html+='<ul style="list-style:none;padding:0;margin:0 auto;display:flex;flex-direction:column;gap:6px;max-width:340px;">';
    ord.forEach(function(p,i){ var tag=p.fin!=null?('#'+(i+1)+' in'):(p.state===2?'out':('depth '+p.depth)); html+='<li class="brow'+(p.name===myName?' me':'')+'"><span class="brk">'+(i+1)+'</span><span class="bnm">'+escapeHtml(p.name)+'</span><span class="bsc">'+tag+'</span></li>'; });
    html+='</ul>'; $('resStats').innerHTML=html; }); }
  function buildModeRow(){ var mr=$('modeRow'); mr.innerHTML=''; [['solo','Solo'],['race','Race a friend']].forEach(function(m){ var b=document.createElement('button'); b.className='chip'+(mode===m[0]?' sel':''); b.style.setProperty('--cc','var(--gate)'); b.textContent=m[1]; b.addEventListener('click',function(){ mode=m[0]; buildModeRow(); updateModeUI(); ensureAudio(); }); mr.appendChild(b); }); }
  function updateModeUI(){ var race=(mode==='race'); $('codeLbl').innerHTML = race?'Room code (required)':'Squad code (optional &mdash; share a board with friends)'; $('startBtn').textContent = race?'Find players':'Begin'; }
  function pickQuestion(t){ t=Math.max(1,Math.min(4,t)); var arr=BANK[String(t)]; if(!used[t]) used[t]={}; var tries=0,idx;
    do{ idx=rnd(arr.length); tries++; }while(used[t][idx]&&tries<40); if(Object.keys(used[t]).length>=arr.length) used[t]={}; used[t][idx]=1;
    var q=arr[idx]; var opts=[{text:q.correct,ok:true}]; q.wrong.forEach(function(w){ opts.push({text:w,ok:false}); });
    for(var i=opts.length-1;i>0;i--){ var j=rnd(i+1); var tmp=opts[i]; opts[i]=opts[j]; opts[j]=tmp; } return {q:q.q,opts:opts}; }

  var ROWGAP=96;
  function glyphFor(nd){ if(nd.type==='core') return W.goal; if(nd.type==='start') return GLYPH.ship; return GLYPH[W.types[nd.type].glyph]||''; }
  function buildMap(){ var inner=$('mapInner'),svg=$('edgesSvg');
    inner.querySelectorAll('.node').forEach(function(n){ n.remove(); }); while(svg.firstChild) svg.removeChild(svg.firstChild);
    var mapW=inner.clientWidth||320, totalH=(S.map.R+2)*ROWGAP; inner.style.height=totalH+'px';
    svg.setAttribute('width',mapW); svg.setAttribute('height',totalH); svg.setAttribute('viewBox','0 0 '+mapW+' '+totalH);
    Object.keys(S.map.nodes).forEach(function(id){ var nd=S.map.nodes[id]; nd.px=mapW*nd.frac; nd.py=totalH-ROWGAP*(nd.row+0.7); });
    S.edgeEls={}; S.map.rows.forEach(function(row){ row.forEach(function(a){ a.out.forEach(function(bid){ var b=S.map.nodes[bid];
      var ln=document.createElementNS('http://www.w3.org/2000/svg','line'); ln.setAttribute('x1',a.px); ln.setAttribute('y1',a.py); ln.setAttribute('x2',b.px); ln.setAttribute('y2',b.py); ln.setAttribute('class','edge'); svg.appendChild(ln); S.edgeEls[a.id+'>'+bid]=ln; }); }); });
    S.nodeEls={}; Object.keys(S.map.nodes).forEach(function(id){ var nd=S.map.nodes[id]; var el=document.createElement('button'); el.type='button';
      el.className='node t-'+nd.type+(nd.type==='core'?' core':''); el.style.left=nd.px+'px'; el.style.top=nd.py+'px'; el.innerHTML=glyphFor(nd);
      el.addEventListener('click',function(){ onNodeTap(id); }); inner.appendChild(el); S.nodeEls[id]=el; }); }
  function refreshMap(){ var cur=S.map.nodes[S.pos];
    Object.keys(S.map.nodes).forEach(function(id){ var nd=S.map.nodes[id],el=S.nodeEls[id]; el.classList.remove('done','locked','reachable','current'); el.style.removeProperty('--me');
      if(S.visited[id]) el.classList.add('done');
      if(id===S.pos){ el.classList.add('current'); el.style.setProperty('--me',CHARS[charIdx].col); el.innerHTML=nd.type==='core'?W.goal:GLYPH.ship; }
      else el.innerHTML=glyphFor(nd); });
    var reach=cur.out.slice(); Object.keys(S.edgeEls).forEach(function(k){ S.edgeEls[k].classList.remove('live'); });
    reach.forEach(function(bid){ if(!S.visited[bid]) S.nodeEls[bid].classList.add('reachable'); var e=S.edgeEls[S.pos+'>'+bid]; if(e) e.classList.add('live'); });
    Object.keys(S.map.nodes).forEach(function(id){ if(id!==S.pos&&reach.indexOf(id)<0&&!S.visited[id]) S.nodeEls[id].classList.add('locked'); });
    var ms=$('mapScroll'); ms.scrollTop=Math.max(0,cur.py-ms.clientHeight*0.62); $('statCorrect').textContent=S.correct; renderLives(); }
  function renderLives(){ var box=$('livesBox'); box.innerHTML=''; for(var i=0;i<LIVES;i++){ var sp=document.createElement('span'); sp.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" class="'+(i<S.lives?'':'lost')+'"><path d="M12 3l6.5 17L12 16.4 5.5 20z"/></svg>'; box.appendChild(sp.firstChild); } }

  function beginGame(tier,rng){ used={}; S={map:genMap(tier,rng),pos:null,lives:LIVES,correct:0,wrongs:0,t0:Date.now(),pending:null,visited:{},done:false}; S.pos=S.map.startId; S.visited[S.pos]=1;
    $('tierPill').textContent=TIERS[tier].name.toUpperCase(); $('mpBar').classList.toggle('hidden',!mpOn); show('game');
    requestAnimationFrame(function(){ buildMap(); refreshMap(); startRunTimer(); $('hint').textContent='Tap a glowing node to advance.'; }); }
  function startRun(){ mpOn=false; $('againBtn').classList.remove('hidden'); beginGame(tierIdx, Math.random); }
  var runTimerId=null; function startRunTimer(){ stopRunTimer(); runTimerId=setInterval(function(){ $('runTimer').textContent=fmt((Date.now()-S.t0)/1000); },500); }
  function stopRunTimer(){ if(runTimerId){ clearInterval(runTimerId); runTimerId=null; } }
  function onNodeTap(id){ if(!S||S.pending) return; var node=S.map.nodes[id],cur=S.map.nodes[S.pos]; if(cur.out.indexOf(id)<0||S.visited[id]) return;
    if(node.type==='core'){ S.visited[id]=1; S.pos=id; win(); return; } beginAttempt(node); }
  function beginAttempt(node){ var cfg=TYPE[node.type]; S.pending={node:node,cfg:cfg,need:cfg.pass,have:0}; $('obCard').style.setProperty('--c','var(--'+node.type+')'); $('obWrap').classList.remove('hidden'); nextQuestion(); }
  function nextQuestion(){ var p=S.pending,cfg=p.cfg,qt=Math.max(1,Math.min(4,S.map.base+cfg.delta)),qd=pickQuestion(qt); S.cur=qd;
    var td=W.types[p.node.type]; $('obBanner').textContent=(td.prefix||'')+td.label;
    var sk=$('obStreak'); if(p.need>1){ sk.classList.remove('hidden'); sk.textContent=p.have>0?('Held '+p.have+' of '+p.need+' \u2014 keep going!'):'Two correct in a row to break through.'; } else sk.classList.add('hidden');
    $('obFx').textContent=''; $('obQ').textContent=qd.q; var box=$('obOpts'); box.innerHTML='';
    qd.opts.forEach(function(o){ var b=document.createElement('button'); b.className='opt'; b.textContent=o.text; b.addEventListener('click',function(){ answer(o.ok,b); }); box.appendChild(b); }); startObTimer(cfg.time); }
  function startObTimer(sec){ stopObTimer(); var bar=$('obTimer'),t0=Date.now(),ms=sec*1000; bar.style.width='100%';
    (function tick(){ var left=ms-(Date.now()-t0),pct=Math.max(0,left/ms*100); bar.style.width=pct+'%'; if(left<=0){ answer(false,null); return; } timerRAF=requestAnimationFrame(tick); })(); }
  function stopObTimer(){ if(timerRAF){ cancelAnimationFrame(timerRAF); timerRAF=null; } }
  function answer(ok,btn){ if(!S.pending||S.pending.locked) return; S.pending.locked=true; stopObTimer();
    Array.prototype.forEach.call($('obOpts').children,function(b){ b.style.pointerEvents='none'; });
    if(ok){ if(btn) btn.classList.add('good'); sfxGood(); S.correct++; S.pending.have++;
      if(S.pending.have>=S.pending.need){ $('obFx').textContent='Through!'; $('obFx').style.color='var(--right)'; setTimeout(function(){ passNode(S.pending.node); },620); }
      else { $('obFx').textContent='1 down, 1 to go!'; $('obFx').style.color='var(--gold)'; setTimeout(function(){ S.pending.locked=false; nextQuestion(); },720); } }
    else { if(btn) btn.classList.add('bad'); sfxBad();
      Array.prototype.forEach.call($('obOpts').children,function(b,i){ if(S.cur.opts[i].ok) b.classList.add('good'); });
      S.lives--; S.wrongs++; S.pending.have=0; renderLives();
      if(S.lives<=0){ $('obFx').textContent='Defeated.'; $('obFx').style.color='var(--wrong)'; setTimeout(function(){ defeat(S.pending.node); },900); }
      else { $('obFx').textContent=(btn?'Wrong!':'Out of time!')+' \u2212 a life'; $('obFx').style.color='var(--wrong)'; setTimeout(function(){ S.pending.locked=false; nextQuestion(); },1000); } } }
  function passNode(node){ S.visited[node.id]=1; S.pos=node.id; S.pending=null; $('obWrap').classList.add('hidden'); refreshMap(); if(mpOn) mpPing(S.map.nodes[S.pos].row,S.lives,0);
    var cur=S.map.nodes[S.pos]; if(cur.out.length===1&&S.map.nodes[cur.out[0]].type==='core') $('hint').textContent=W.dest.charAt(0).toUpperCase()+W.dest.slice(1)+' is in reach \u2014 make the final move!'; else $('hint').textContent='Cleared! Choose your next move.'; }
  function win(){ stopRunTimer(); stopObTimer(); if(mpOn){ S.done=true; mpPing(S.map.R+1,S.lives,1); mpResults('win'); return; } var el=(Date.now()-S.t0)/1000; lastRun={correct:S.correct,level:S.lives,timeLeft:el,t:Date.now()};
    $('resTitle').textContent=W.winTitle; $('resTitle').style.color='var(--gold)';
    $('resStats').innerHTML='Reached '+W.dest+' in <b>'+fmt(el)+'</b><br>'+S.lives+' \u2665 remaining \u00b7 '+S.correct+' obstacles cleared';
    boardCtx='result'; $('saveArea').classList.remove('hidden'); $('saveSummary').textContent=fmtScore(lastRun); var nm=lsGet(NAME_KEY); if(nm) $('boardName').value=nm; show('result'); showBoard(); }
  function defeat(node){ stopRunTimer(); stopObTimer(); S.pending=null; $('obWrap').classList.add('hidden'); if(mpOn){ S.done=true; mpPing(node?node.row:0,S.lives,2); mpResults('lose'); return; } lastRun=null; var depth=node?node.row:0;
    $('resTitle').textContent=W.loseTitle; $('resTitle').style.color='var(--wrong)';
    $('resStats').innerHTML='Your run ended at depth <b>'+depth+'</b> of '+S.map.R+'<br>'+S.correct+' obstacles cleared \u00b7 '+fmt((Date.now()-S.t0)/1000);
    boardCtx='result'; $('saveArea').classList.add('hidden'); show('result'); showBoard(); }

  function buildMenu(){ var cr=$('charRow'); cr.innerHTML='';
    CHARS.forEach(function(c,i){ var b=document.createElement('button'); b.className='chip'+(i===charIdx?' sel':''); b.style.setProperty('--cc',c.col); b.innerHTML='<span class="dot"></span>'+c.name; b.addEventListener('click',function(){ charIdx=i; buildMenu(); ensureAudio(); }); cr.appendChild(b); });
    var tr=$('tierRow'); tr.innerHTML=''; TIERS.forEach(function(t,i){ var b=document.createElement('button'); b.className='chip'+(i===tierIdx?' sel':''); b.textContent=t.name; b.addEventListener('click',function(){ tierIdx=i; buildMenu(); ensureAudio(); }); tr.appendChild(b); }); }
  function fillTexts(){ $('subEl').textContent=W.sub; $('titleEl').textContent=W.brand; $('leadEl').textContent=W.lead; $('pilotLbl').textContent=W.pilot; $('crewLbl').textContent=W.crew;
    var how=$('howEl'); how.innerHTML=''; ['gate','timed','enemy','sealed'].forEach(function(t){ var d=document.createElement('div'); d.className='howline'; d.innerHTML='<span class="pip" style="background:var(--'+t+')"></span>'+W.types[t].label+' <small>&mdash; '+HOWDESC[t]+'</small>'; how.appendChild(d); }); }
  function init(){ fillTexts(); var nm=lsGet(NAME_KEY); if(nm) $('nameIn').value=nm; var gc=lsGet(GROUP_KEY); if(gc) $('codeIn').value=gc; buildMenu(); buildModeRow(); updateModeUI();
    $('startBtn').addEventListener('click',function(){ ensureAudio(); myName=($('nameIn').value||'').trim().slice(0,14)||'Player'; lsSet(NAME_KEY,myName); var code=($('codeIn').value||'').trim(); lsSet(GROUP_KEY,code);
      if(mode==='race'){ room=code.toUpperCase().replace(/[^A-Z0-9_-]/g,'').slice(0,24); if(!room){ $('menuErr').textContent='Enter a room code to race.'; return; } $('menuErr').textContent=''; enterLobby(); }
      else { startRun(); } });
    $('startRaceBtn').addEventListener('click',function(){ ensureAudio(); mpGO(tierIdx); $('lobbyStatus').textContent='Starting\u2026'; });
    $('leaveLobby').addEventListener('click',function(){ stopAllNet(); show('menu'); });
    $('boardBtn').addEventListener('click',function(){ ensureAudio(); boardCtx='menu'; show('boardScreen'); showBoard(); });
    $('boardBack').addEventListener('click',function(){ show('menu'); });
    $('boardSave').addEventListener('click',saveScore);
    $('againBtn').addEventListener('click',function(){ ensureAudio(); startRun(); });
    $('menuBtn2').addEventListener('click',function(){ stopAllNet(); show('menu'); }); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();

  window.__core_test=function(cmd,arg){
    if(cmd==='gencheck'){ for(var t=0;t<TIERS.length;t++){ for(var k=0;k<60;k++){ var m=genMap(t); var v=validateMap(m); if(v!=='ok') return 'FAIL t'+t+':'+v; } } return 'OK'; }
    if(cmd==='simulate'){ return simulate(arg); }
    if(cmd==='world'){ return W.id+'|'+W.brand+'|'+W.types.enemy.label; }
    if(cmd==='seedcheck'){ function sig(m){ return m.rows.map(function(r){ return r.map(function(n){ return n.type[0]; }).join(''); }).join('|'); }
      var A=sig(genMap(2,mulberry32(hstr('ROOM')))),B=sig(genMap(2,mulberry32(hstr('ROOM')))),C=sig(genMap(2,mulberry32(hstr('ROOM2')))); return (A===B&&A!==C)?'OK':('FAIL '+A+' :: '+C); }
    if(cmd==='digest'){ var d=digest(arg); return JSON.stringify({go:d.go,tier:d.tier,n:d.players.length,order:sortStandings(d.players).map(function(p){ return p.name+':'+(p.fin!=null?'F':p.state)+':'+p.depth; })}); }
    return 'unknown'; };
  function validateMap(m){ var idsl=Object.keys(m.nodes); for(var i=0;i<idsl.length;i++){ var n=m.nodes[idsl[i]]; if(n.type!=='start'&&n.in.length===0) return 'in'; if(n.type!=='core'&&n.out.length===0) return 'out'; }
    var seen={},q=[m.startId]; seen[m.startId]=1; while(q.length){ var c=m.nodes[q.shift()]; c.out.forEach(function(b){ if(!seen[b]){ seen[b]=1; q.push(b); } }); }
    if(!seen[m.coreId]) return 'core'; for(var j=0;j<idsl.length;j++){ if(!seen[idsl[j]]) return 'island'; } return 'ok'; }
  function simulate(policy){ var m=genMap(0),pos=m.startId,lives=LIVES,cleared=0,wrongs=0,steps=0;
    while(true){ steps++; if(steps>500) return 'loop'; var cur=m.nodes[pos]; if(cur.type==='core') return 'WIN cleared='+cleared+' lives='+lives;
      var nid=cur.out[0],node=m.nodes[nid]; if(node.type==='core'){ pos=nid; continue; } var need=TYPE[node.type].pass,have=0;
      while(have<need){ if(policy==='win') have++; else { lives--; wrongs++; have=0; if(lives<=0) return 'DEFEAT cleared='+cleared+' wrongs='+wrongs; } } cleared++; pos=nid; } }
})();
</script>
